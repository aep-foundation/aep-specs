name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.number || github.run_id }}
  cancel-in-progress: true

jobs:
  specs:
    name: Specs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ietf

      - name: Check drafts and support files
        run: make -C ietf check
