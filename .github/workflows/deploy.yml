name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-release-deploy:
    name: Build, Release, Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ietf

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ietf/requirements.txt

      - name: Install PDF system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-noto

      - name: Install Python tooling
        working-directory: ietf
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Check drafts and support files
        run: make -C ietf check

      - name: Render release artifacts
        run: make -C ietf render

      - name: Publish latest release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest artifacts/draft-*.html artifacts/draft-*.txt artifacts/draft-*.xml artifacts/draft-*.pdf \
            --title "Latest AEP specification artifacts" \
            --notes "Auto-published AEP specification artifacts from commit ${{ github.sha }}." \
            --latest

      - name: Prepare GitHub Pages
        run: |
          mkdir -p _site
          cp -R docs/. _site/
          rm -rf _site/artifacts

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
